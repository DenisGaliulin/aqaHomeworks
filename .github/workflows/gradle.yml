name: CI

on:
  push:
    branches:
      - '**'  
  pull_request:
    branches:
      - '**'  
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' 

      - name: Install dependencies
        run: npm ci 

     
      - name: Run tests
        run: npm test

  
